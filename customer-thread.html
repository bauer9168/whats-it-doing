
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="WID Thread" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#244fbe" />
  <title>What's it Doing? — Customer Thread</title>
  <style>
    :root{--blue:#244fbe;--blue2:#173a93;--bg:#f7faff;--bg2:#e8eef8;--text:#111114;--muted:#5f6470;--border:#d4dce8;--card:#fff;}
    *{box-sizing:border-box} html,body{margin:0;min-height:100%;background:var(--blue);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-text-size-adjust:120%;overflow-x:hidden;}
    body::before,body::after{content:"";position:fixed;left:0;right:0;height:env(safe-area-inset-top,0px);top:0;background:var(--blue);z-index:9999;pointer-events:none}body::after{top:auto;bottom:0;height:env(safe-area-inset-bottom,0px)}
    .app{width:min(900px,100vw);margin:0 auto;min-height:100dvh;background:linear-gradient(180deg,var(--bg),var(--bg2));padding:calc(12px + env(safe-area-inset-top,0px)) 10px calc(16px + env(safe-area-inset-bottom,0px));border-left:6px solid var(--blue);border-right:6px solid var(--blue)}
    .top{background:linear-gradient(180deg,var(--blue),var(--blue2));color:white;border-radius:18px;padding:14px 14px;margin-bottom:10px;box-shadow:0 8px 22px rgba(23,58,146,.22)}
    h1{margin:0;font-size:24px;line-height:1.05;letter-spacing:-.035em}.sub{font-size:13px;opacity:.88;margin-top:4px;line-height:1.3}.card{background:rgba(255,255,255,.86);border:1px solid var(--border);border-radius:18px;padding:12px;margin:10px 0}.summary{font-size:14px;line-height:1.35;color:#1f2937}.thread{display:grid;gap:8px;margin-top:10px;max-height:58dvh;overflow:auto;padding-bottom:8px}.bubble{max-width:88%;padding:10px 12px;border-radius:18px;font-size:15px;line-height:1.35;white-space:pre-wrap;overflow-wrap:anywhere}.customer{margin-left:auto;background:linear-gradient(180deg,var(--blue),var(--blue2));color:white;border-bottom-right-radius:6px}.operator{background:#f1f5f9;border:1px solid #dbe3ef;border-bottom-left-radius:6px}.system{margin:0 auto;max-width:96%;background:white;border:1px dashed var(--border);color:var(--muted);font-size:12px;text-align:center}.meta{display:block;margin-top:4px;font-size:10px;opacity:.7;font-weight:750}textarea{width:100%;min-height:96px;border:1px solid var(--border);border-radius:16px;padding:11px 12px;font:inherit;font-size:16px;resize:vertical;background:white}button{border:1px solid var(--border);border-radius:14px;padding:11px 12px;font:inherit;font-weight:850;background:white}button.dark{background:linear-gradient(180deg,var(--blue),var(--blue2));color:#fff;border-color:var(--blue2)}.row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:stretch}.error{background:#fff1f2;border-color:#fecdd3;color:#9f1239}.muted{color:var(--muted)}
  </style>
</head>
<body>
  <div class="app">
    <div class="top"><h1>What's it Doing?</h1><div class="sub">Your paid consult thread</div></div>
    <div id="caseCard" class="card"><strong>Loading your case...</strong><div class="sub muted">This link is tied to the completed checkout session.</div></div>
    <div class="card">
      <div id="thread" class="thread"><div class="bubble system">Messages will show here after payment is verified.</div></div>
      <div class="row" style="margin-top:10px;"><textarea id="messageBox" placeholder="Reply with updates, test results, photos described in text, or questions."></textarea><button id="sendBtn" class="dark" type="button">Send</button></div>
      <div class="sub muted" style="margin-top:8px;">This is not live chat. Please include all details that changed since your last message.</div>
    </div>
  </div>
<script>
  const qs = new URLSearchParams(location.search);
  const sessionId = qs.get('session_id') || qs.get('session') || '';
  const els = { caseCard:document.getElementById('caseCard'), thread:document.getElementById('thread'), box:document.getElementById('messageBox'), send:document.getElementById('sendBtn') };
  function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
  function renderBubble(m){const who=(m.who||m.sender||'customer').toLowerCase();const cls=who.includes('operator')||who.includes('bryan')?'operator':who.includes('system')?'system':'customer';return `<div class="bubble ${cls}">${esc(m.text||m.body||'')}<span class="meta">${esc(m.created_at||m.at||'')}</span></div>`;}
  async function loadThread(){
    if(!sessionId){els.caseCard.classList.add('error');els.caseCard.innerHTML='<strong>Missing payment session.</strong><div class="sub">Open the link from your paid checkout confirmation.</div>';return;}
    try{
      const res=await fetch('/.netlify/functions/get-customer-thread?session_id='+encodeURIComponent(sessionId));
      const data=await res.json().catch(()=>({}));
      if(!res.ok||!data.ok) throw new Error(data.error||'Could not load thread');
      const c=data.consult||{};
      els.caseCard.innerHTML=`<strong>${esc(c.vehicle_summary||'Vehicle')}</strong><div class="summary"><br><strong>Issue:</strong> ${esc(c.issue_summary||'')}<br><strong>Already done:</strong> ${esc(c.work_done_summary||'')}<br><strong>Status:</strong> ${esc(c.status||'paid')}</div>`;
      const messages=Array.isArray(data.messages)?data.messages:[];
      els.thread.innerHTML=messages.length?messages.map(renderBubble).join(''):'<div class="bubble system">Payment received. Your consult thread is open.</div>';
      els.thread.scrollTop=els.thread.scrollHeight;
    }catch(err){els.caseCard.classList.add('error');els.caseCard.innerHTML='<strong>Thread could not load.</strong><div class="sub">'+esc(err.message||err)+'</div>';}
  }
  async function sendMessage(){
    const text=(els.box.value||'').trim(); if(!text) return;
    els.send.disabled=true; const original=els.send.textContent; els.send.textContent='Sending...';
    try{
      const res=await fetch('/.netlify/functions/post-customer-message',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sessionId,text})});
      const data=await res.json().catch(()=>({})); if(!res.ok||!data.ok) throw new Error(data.error||'Could not send message');
      els.box.value=''; await loadThread();
    }catch(err){alert('Could not send yet: '+(err.message||err));}
    finally{els.send.disabled=false;els.send.textContent=original;}
  }
  els.send.onclick=sendMessage;
  els.box.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='Enter')sendMessage();});
  loadThread();
</script>
</body>
</html>
