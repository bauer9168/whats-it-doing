

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />

  <title>What's it Doing? — Operator v103 persistent replies</title>
  <style>
    :root {
      --bg:#f7faff;
      --bg2:#e8eef8;
      --text:#0e0f12;
      --muted:#5f6470;
      --border:#d4dce8;
      --dash:#a9b5c8;
      --blue:#244fbe;
      --ok:#166534;
      --warn:#9a5b00;
      --danger:#9f1239;
      --priority:#b91c1c;
      --priority-bg:#fff1f2;
      --extended:#15803d;
      --extended-bg:#f0fdf4;
      --line:#244fbe;
    }
    * { box-sizing:border-box; }
    html { margin:0; min-height:100%; background:var(--blue); overflow-x:hidden; }
    body { margin:0; min-height:100%; width:100%; max-width:100vw; overflow-x:hidden; }
    body {
      background:linear-gradient(180deg,var(--bg),var(--bg2));
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      -webkit-text-size-adjust:120%;
    }
    .app {
      width:100%;
      max-width:900px;
      min-width:0;
      margin:0 auto;
      min-height:100dvh;
      padding:12px 8px calc(72px + env(safe-area-inset-bottom, 0px));
    }
    .top {
      margin:0 0 10px;
      padding:2px 2px 10px;
      background:transparent;
      border-bottom:2px dotted var(--dash);
    }
    h1 { margin:0; font-size:25px; letter-spacing:-.04em; line-height:1.05; }
    .top-title-row { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:4px; }
    .top-title-row h1 { min-width:0; }
    .sub { color:var(--muted); font-size:13px; margin-top:2px; line-height:1.25; }
    .controls { display:block; margin-top:6px; }
    .filter-refresh-row { display:grid; grid-template-columns:minmax(0, 1fr) auto; gap:6px; align-items:center; width:100%; max-width:100%; overflow:hidden; }
    .filter-refresh-row select,
    .filter-refresh-row button { min-height:36px; height:36px; padding-top:6px; padding-bottom:6px; line-height:1.1; }
    .filter-refresh-row select { appearance:auto; -webkit-appearance:menulist; min-width:0; width:100%; max-width:100%; overflow:hidden; text-overflow:ellipsis; }
    .pin-row { display:block; margin-top:6px; }
    .pin-row input { width:100%; }
    .auto-archive-toggle { font-size:11px !important; padding:5px 7px !important; border-radius:999px !important; min-height:0 !important; white-space:nowrap; flex:0 0 auto; }
    .queue-strip { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-top:9px; }
    .queue-tile { border:1px solid var(--border); border-radius:14px; background:rgba(255,255,255,.64); padding:7px 8px; min-height:46px; }
    .queue-tile .k { font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); font-weight:900; }
    .queue-tile .v { margin-top:2px; font-size:17px; line-height:1; color:var(--blue); font-weight:1000; }
    .queue-tile.priority .v { color:var(--priority); }
    .queue-tile.extended .v { color:var(--extended); }
    .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    input, select, button, textarea {
      border:1px solid var(--border);
      border-radius:14px;
      padding:10px 12px;
      font-size:16px;
      font-family:inherit;
      max-width:100%;
    }
    select { min-width:0; }
    input { min-width:150px; flex:1; }
    button { background:#fff; cursor:pointer; font-weight:700; }
    button.dark { background:linear-gradient(180deg,#244fbe,#173a93); color:#fff; border-color:#173a93; }
    button.small { font-size:14px; padding:8px 10px; border-radius:12px; }
    button.close-case { border-color:#fecdd3; color:var(--danger); background:#fff7f8; }
    button.reopen-case { border-color:#bbf7d0; color:var(--ok); background:#f0fdf4; }
    .queue { display:block; }
    .case {
      position:relative;
      background:transparent;
      border:0;
      border-radius:0;
      padding:13px 2px 15px;
      box-shadow:none;
      border-bottom:2px dotted var(--dash);
      cursor:default;
      touch-action:manipulation;
    }
    .case:first-child { border-top:2px dotted var(--dash); }
    .case.extended {
      background:linear-gradient(90deg, rgba(240,253,244,.92), transparent 74%);
      margin-left:-8px;
      margin-right:-8px;
      padding-left:8px;
      padding-right:8px;
    }
    .case.waiting-me {
      background:linear-gradient(90deg, rgba(255,241,242,.88), transparent 74%);
      margin-left:-8px;
      margin-right:-8px;
      padding-left:8px;
      padding-right:8px;
    }
    .case-head { display:grid; grid-template-columns:1fr auto; gap:10px; align-items:flex-start; }
    .left-lines { min-width:0; padding-right:4px; }
    .customer-name,
    .vehicle-line {
      font-size:21px;
      font-weight:900;
      line-height:1.08;
      letter-spacing:-.025em;
      overflow-wrap:anywhere;
    }
    .vehicle-line { margin-top:3px; }
    .symptom-line {
      color:#171a20;
      font-size:20px;
      font-weight:900;
      line-height:1.12;
      margin-top:8px;
      letter-spacing:-.025em;
      overflow-wrap:anywhere;
    }
    .meta { color:var(--muted); font-size:12px; line-height:1.35; margin-top:6px; }
    .right-stack {
      display:flex;
      flex-direction:column;
      align-items:flex-end;
      gap:7px;
      min-width:78px;
    }
    .case-number {
      align-self:flex-end;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:76px;
      padding:7px 8px 6px;
      border:3px solid var(--blue);
      border-radius:16px 16px 16px 4px;
      background:#fff;
      box-shadow:3px 3px 0 var(--blue);
      color:var(--blue);
      font-size:23px;
      font-weight:1000;
      letter-spacing:.02em;
      line-height:1;
      transform:rotate(1deg);
    }
    .case.waiting-me .case-number { border-color:var(--blue); color:var(--blue); box-shadow:3px 3px 0 var(--blue); }
    body:not(.focus-mode) .case.waiting-me .status-label { color:var(--priority); font-weight:1000; }
    .queue-badge {
      display:inline-flex;
      align-items:center;
      border:1px solid var(--border);
      background:rgba(255,255,255,.72);
      border-radius:999px;
      padding:5px 8px;
      font-size:12px;
      color:var(--blue);
      white-space:nowrap;
      line-height:1.1;
      font-weight:850;
    }
    .queue-badge.priority { color:var(--priority); border-color:#fecdd3; background:var(--priority-bg); }
    .queue-badge.extended { color:var(--extended); border-color:#bbf7d0; background:var(--extended-bg); }
    .case.extended .case-number { border-color:var(--extended); color:var(--extended); box-shadow:3px 3px 0 var(--extended); }
    .case.extended.waiting-me .status-label,
    .case.extended.waiting-me .meta,
    body.focus-mode .case.extended.waiting-me .status-label { color:var(--priority) !important; font-weight:1000 !important; }
    .case.waiting-me .status-label,
    .case.waiting-me .meta,
    body.focus-mode .case.waiting-me .status-label,
    body.focus-mode .case.waiting-me .meta { color:var(--priority) !important; font-weight:1000 !important; }
    body.focus-mode .case.focused .symptom-line { font-size:16px !important; line-height:1.18 !important; }
    body.focus-mode .case.focused .meta { font-size:11px !important; line-height:1.25 !important; }
    .timer-summary {
      margin-top:8px;
      border:1px solid #fed7aa;
      background:#fff7ed;
      color:#7c4a03;
      border-radius:13px;
      padding:8px 10px;
      font-size:12px;
      line-height:1.32;
      font-weight:800;
      white-space:normal;
    }
    .autoclose-thread-note {
      display:none;
      border-top:1px solid rgba(148,163,184,.20);
      background:#fff;
      color:#9aa3af;
      font-size:9.5px;
      line-height:1.15;
      padding:3px 9px 2px;
      font-weight:700;
      text-align:right;
      letter-spacing:.01em;
    }
    .autoclose-thread-note.active { display:block; }
    .autoclose-countdown { font-weight:1000; color:#7c4a03; }
    .icons { display:flex; gap:7px; justify-content:flex-end; flex-wrap:wrap; margin-top:2px; }
    .icon {
      min-width:34px;
      height:34px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border:2px dashed var(--dash);
      border-radius:999px;
      background:rgba(255,255,255,.54);
      color:#293241;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
      user-select:none;
    }
    .icon.on { border-style:solid; background:#fff; }
    .case { cursor:pointer; }
    .case:active { transform:translateY(1px); }
    .message-panel { margin-top:10px; display:grid; gap:8px; }
    textarea.replybox { width:100%; min-height:86px; resize:vertical; border:1px solid var(--border); border-radius:14px; padding:10px 12px; font:inherit; font-size:16px; background:#fff; color:var(--text); }
    .message-actions { display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
    .message-actions button { font-size:13px; padding:7px 10px; border-radius:11px; }
    .copy-btn { border-color:#bcd0ff; color:#fff; background:linear-gradient(180deg,#244fbe,#173a93); }
    .workflow-actions { margin:12px 0 10px; padding:10px 0 0; border-top:1px dotted var(--dash); display:grid; grid-template-columns:1fr 1fr; gap:7px; align-items:stretch; }
    .workflow-actions button { font-size:13px; padding:8px 9px; border-radius:11px; opacity:.96; min-height:38px; }
    .workflow-actions .waiting-btn { color:#7c4a03; border-color:#fed7aa; background:#fff7ed; grid-column:2; grid-row:1; }
    .workflow-actions .reset-btn { color:#334155; border-color:#cbd5e1; background:#f8fafc; grid-column:1; grid-row:2; }
    .workflow-actions .undo-btn { color:#334155; border-color:#cbd5e1; background:#f8fafc; grid-column:2; grid-row:2; }
    .workflow-actions .close-case, .workflow-actions .reopen-case { grid-column:1; grid-row:1; }
    .workflow-actions .archive-btn { grid-column:1 / -1; grid-row:3; }
    .operator-action-buttons { justify-content:flex-end; gap:6px; }
    .operator-action-buttons button { white-space:nowrap; }
    .archive-btn { color:#475569; border-color:#cbd5e1; background:#f8fafc; }

    .timer-note { margin-top:6px; color:var(--muted); font-size:11px; text-align:right; width:100%; }
    .details { display:none; margin-top:12px; }
    .details.open { display:block; }
    .box {
      background:rgba(255,255,255,.7);
      border:1px solid var(--border);
      border-radius:14px;
      padding:10px 12px;
      font-size:15px;
      line-height:1.42;
      white-space:pre-wrap;
      overflow-wrap:anywhere;
    }
    .label {
      color:var(--muted);
      font-size:11px;
      letter-spacing:.08em;
      text-transform:uppercase;
      font-weight:900;
      margin:10px 0 5px;
    }
    .pathline { display:block; margin-top:3px; color:var(--muted); font-size:12px; font-weight:600; word-break:break-all; }
    audio { width:100%; margin-top:6px; }
    img.thumb { width:100%; max-height:380px; object-fit:contain; background:#fff; border:1px solid var(--border); border-radius:14px; margin-top:8px; cursor:zoom-in; }
    a.filelink { display:block; margin-top:8px; color:var(--blue); font-weight:750; text-decoration:none; word-break:break-word; }
    .muted { color:var(--muted); }
    .error { color:#9f1239; background:#fff1f2; border:1px solid #fecdd3; border-radius:14px; padding:10px 12px; margin-top:10px; font-size:14px; }
    .empty { text-align:center; color:var(--muted); padding:36px 10px; }

    .message-tabs { display:flex; gap:7px; margin:2px 0 8px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .message-tab { flex:0 0 auto; border:1px solid var(--border); background:#fff; color:var(--muted); border-radius:999px; padding:7px 10px; font-size:13px; font-weight:900; }
    .message-tab.active { background:var(--blue); border-color:var(--blue); color:#fff; }
    .texting-shell { margin-top:10px; border:1px solid var(--border); border-radius:18px; background:rgba(255,255,255,.76); overflow:hidden; }
    .texting-head { padding:9px 11px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; gap:8px; align-items:center; }
    .texting-title { font-size:14px; font-weight:1000; color:var(--blue); }
    .texting-sub { font-size:11px; color:var(--muted); font-weight:750; text-align:right; }
    .thread { padding:12px 10px 10px; max-height:52dvh; overflow:auto; scroll-padding-bottom:110px; background:linear-gradient(180deg,#fff,rgba(248,251,255,.94)); }
    .bubble { max-width:88%; padding:10px 12px; border-radius:18px; margin:0 0 8px; font-size:15px; line-height:1.35; white-space:pre-wrap; overflow-wrap:anywhere; }
    .bubble.customer { background:#f1f5f9; border:1px solid #dbe3ef; border-bottom-left-radius:6px; color:#111827; }
    .bubble.operator { background:linear-gradient(180deg,#244fbe,#173a93); color:#fff; margin-left:auto; border-bottom-right-radius:6px; }
    .bubble.system { margin-left:auto; margin-right:auto; max-width:96%; background:#fff; border:1px dashed var(--dash); color:var(--muted); font-size:12px; text-align:center; }
    .bubble.info { margin-left:auto; margin-right:auto; max-width:92%; background:#f8fafc; border:1px solid #e5e7eb; color:#7a8493; font-size:11px; line-height:1.22; text-align:center; padding:7px 9px; }
    .bubble-meta { display:block; margin-top:4px; font-size:10px; opacity:.72; font-weight:750; }
    .bubble-image-thumb { display:block; width:100%; max-width:240px; max-height:180px; object-fit:cover; border-radius:13px; margin-top:7px; border:1px solid rgba(255,255,255,.55); background:#fff; cursor:zoom-in; }
    .bubble.customer .bubble-image-thumb, .bubble.system .bubble-image-thumb { border-color:var(--border); }
    .message-image-modal { position:fixed; inset:0; z-index:90; background:rgba(15,23,42,.92); display:flex; align-items:center; justify-content:center; padding:14px; }
    .message-image-modal img { max-width:100%; max-height:100%; object-fit:contain; border-radius:12px; background:#fff; }
    .message-image-modal .close-image { position:fixed; top:10px; right:10px; border:1px solid rgba(255,255,255,.35); background:rgba(255,255,255,.12); color:#fff; border-radius:999px; padding:9px 12px; font-size:13px; font-weight:900; }
    .quick-replies {
      display:grid !important;
      grid-template-columns:repeat(3, minmax(0, 1fr)) !important;
      grid-template-rows:repeat(2, 18px) !important;
      grid-auto-rows:18px !important;
      gap:2px !important;
      padding:3px 7px 2px !important;
      background:#fff;
      border-top:1px solid var(--border);
      touch-action:pan-y;
      max-height:41px !important;
      min-height:0 !important;
      overflow:hidden;
    }
    .quick-replies button {
      width:100%;
      min-width:0;
      font-size:8.5px !important;
      padding:1px 3px !important;
      border-radius:999px;
      line-height:1 !important;
      min-height:0 !important;
      height:18px !important;
      max-height:18px !important;
      white-space:nowrap !important;
      overflow:hidden;
      text-overflow:ellipsis;
      touch-action:pan-y;
    }
    .last-message-preview { margin-top:5px; color:var(--muted); font-size:12px; line-height:1.22; font-weight:800; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
    body.focus-mode .case.focused .last-message-preview { display:none !important; }
    .phone-compose { display:grid; grid-template-columns:minmax(0,1fr) 72px; gap:7px; padding:8px 9px 9px; background:#fff; align-items:stretch; }
    .phone-compose textarea { min-height:54px; max-height:132px; width:100%; min-width:0; resize:none; border-radius:16px; font-size:16px; line-height:1.28; padding:10px 11px; overflow:auto; }
    .phone-compose textarea:focus { min-height:82px; }
    .phone-compose textarea.is-growing { transition:height .08s ease; }
    .phone-buttons { display:flex; flex-direction:column; gap:5px; min-width:0; }
    .phone-buttons button { padding:7px 6px; font-size:12px; border-radius:11px; width:100%; touch-action:manipulation; }
    .phone-buttons .photo-btn { padding:4px 5px; min-height:24px; font-size:11px; line-height:1; border-radius:999px; color:var(--blue); border-color:#bcd0ff; background:#f8fbff; }
    .phone-buttons .send { background:linear-gradient(180deg,#244fbe,#173a93); color:#fff; border-color:#173a93; }
    .case-detail-grid { margin-top:12px; }

    body.focus-mode { overflow:hidden; overscroll-behavior:none; position:fixed; left:0; right:0; width:100%; max-width:100vw; background:var(--blue); }
    body.focus-mode .top { display:none; }
    body.focus-mode .app { max-width:900px; height:100dvh; overflow:hidden; overscroll-behavior:none; padding:0 8px env(safe-area-inset-bottom, 0px); }
    body.focus-mode .case:not(.focused) { display:none; }
    body.focus-mode .case.focused {
      position:fixed;
      left:0;
      right:0;
      top:0;
      width:100vw;
      max-width:100vw;
      bottom:0;
      height:auto;
      z-index:40;
      overflow:auto;
      overscroll-behavior:none;
      touch-action:pan-y;
      -webkit-overflow-scrolling:auto;
      border-top:0;
      border-bottom:0;
      padding:10px 8px 0;
      background:linear-gradient(180deg,#f7faff,#eef4ff);
    }
    body.focus-mode.keyboard-active .case.focused.keyboard-space {
      padding-bottom:calc(46dvh + env(safe-area-inset-bottom, 0px));
    }
    body.focus-mode .case.focused .details { display:block; }
    body.focus-mode .case.focused .details::after { content:''; display:block; height:0; }
    body.focus-mode .case.focused .texting-shell { margin-bottom:0; border-bottom-left-radius:0; border-bottom-right-radius:0; }
    body.focus-mode .case.focused .phone-compose { padding-bottom:0 !important; }
    body.focus-mode .case.focused .phone-buttons { padding-bottom:0 !important; }
    body.focus-mode .case.focused .workflow-actions { margin-bottom:6px; }
    .workflow-actions .undo-btn { display:block !important; visibility:visible !important; opacity:1 !important; }

    .call-btn { display:inline-flex; align-items:center; justify-content:center; margin-top:8px; width:100%; text-decoration:none; border:1px solid #bcd0ff; color:#fff; background:linear-gradient(180deg,#244fbe,#173a93); border-radius:13px; padding:10px 12px; font-size:15px; font-weight:900; }
    .uploads-list { display:grid; gap:6px; margin-top:6px; }
    .upload-row { display:flex; gap:8px; align-items:center; justify-content:flex-start; padding:0; background:transparent; border:0; }
    .upload-row a { color:var(--blue); font-size:11px; letter-spacing:.08em; text-transform:uppercase; font-weight:900; text-decoration:none; }
    .bubble { cursor:pointer; }
    .texting-shell { overscroll-behavior:contain; }
    .texting-shell.collapsed .thread,
    .texting-shell.collapsed .quick-replies,
    .texting-shell.collapsed .autoclose-thread-note,
    .texting-shell.collapsed .phone-compose { display:none; }
    .texting-shell.collapsed .texting-head { border-bottom:0; }
    body.focus-mode .texting-shell .thread { max-height:62dvh; }
    body.focus-mode .texting-shell .bubble { max-width:96%; font-size:17px; line-height:1.38; }
    .texting-shell.message-zoom {
      position:fixed;
      left:0;
      right:0;
      top:0;
      width:100vw;
      max-width:100vw;
      bottom:0;
      height:calc(var(--vvh, 100dvh) - env(safe-area-inset-bottom, 0px));
      z-index:60;
      background:#fff;
      box-shadow:0 18px 60px rgba(15,23,42,.25);
      display:flex;
      flex-direction:column;
      overflow:hidden;
      overscroll-behavior:none;
      touch-action:pan-y;
    }
    .texting-shell.message-zoom .texting-head { flex:0 0 auto; }
    .texting-shell.message-zoom .thread { flex:1 1 auto; max-height:none; min-height:0; scroll-padding-bottom:18px; overscroll-behavior:none; }
    .texting-shell.message-zoom .quick-replies,
    .texting-shell.message-zoom .phone-compose { flex:0 0 auto; }



    /* v58 hard overrides: keep these late so older mobile rules cannot win. */
    .quick-replies.wid-v58-quick {
      display:grid !important;
      grid-template-columns:repeat(3, minmax(0, 1fr)) !important;
      grid-template-rows:repeat(2, 20px) !important;
      grid-auto-rows:0 !important;
      gap:3px !important;
      padding:4px 6px !important;
      max-height:49px !important;
      min-height:49px !important;
      height:49px !important;
      overflow:hidden !important;
      align-content:start !important;
    }
    .quick-replies.wid-v58-quick button {
      display:block !important;
      height:20px !important;
      min-height:20px !important;
      max-height:20px !important;
      padding:2px 4px !important;
      font-size:9px !important;
      line-height:1 !important;
      white-space:nowrap !important;
      overflow:hidden !important;
      text-overflow:clip !important;
    }
    .workflow-actions.wid-v58-workflow {
      display:grid !important;

        "close waiting"

        "archive archive" !important;
      gap:7px !important;
    }

      const compose = box.closest('.phone-compose');
      if (!card || !compose || !document.body.classList.contains('focus-mode')) return;
      const vvHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
      const targetBottom = Math.max(140, vvHeight - 2);
      const rect = compose.getBoundingClientRect();
      const delta = rect.bottom - targetBottom;
      if (Math.abs(delta) > 3) {
        card.scrollTo({ top:Math.max(0, card.scrollTop + delta), behavior: instant ? 'auto' : 'smooth' });
      }
    }

    function settleComposeBottomAfterKeyboard(box) {
      if (!box) return;
      [80, 180, 320].forEach(delay => setTimeout(() => alignComposeBottom(box, true), delay));
    }

    function activeComposeBox() {
      const el = document.activeElement;
      return el && el.matches && el.matches('textarea[data-reply-draft]') ? el : null;
    }

    function dismissKeyboardFromOuterScroll(target) {
      const box = activeComposeBox();
      if (!box) return;
      const node = target && target.nodeType === 1 ? target : (target && target.parentElement);
      clearComposeScrollTimers(box);
      if (node && node.closest && node.closest('.phone-compose,.quick-replies')) return;
      try { box.blur(); } catch (_) {}
      setKeyboardSpace(box, false);
    }

    const composeScrollTimers = new WeakMap();

    function clearComposeScrollTimers(box) {
      if (!box) return;
      const timers = composeScrollTimers.get(box) || [];
      timers.forEach(id => clearTimeout(id));
      composeScrollTimers.set(box, []);
    }

    function scheduleComposeScroll(box, delay, options = {}) {
      if (!box) return;
      const timers = composeScrollTimers.get(box) || [];
      const id = setTimeout(() => {
        const current = composeScrollTimers.get(box) || [];
        composeScrollTimers.set(box, current.filter(item => item !== id));
        if (document.activeElement === box) keepComposeVisible(box, options);
      }, delay);
      timers.push(id);
      composeScrollTimers.set(box, timers);
    }

    function composeLooksVisible(compose) {
      if (!compose) return false;
      const rect = compose.getBoundingClientRect();
      const vvHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
      return rect.top >= 10 && rect.bottom <= (vvHeight - 8);
    }

    function keepComposeVisible(box, options = {}) {
      if (!box) return;
      setKeyboardSpace(box, true);
      const shell = box.closest('.texting-shell');
      const thread = shell && shell.querySelector('.thread');
      const compose = box.closest('.phone-compose') || box;
      if (thread && options.threadBottom !== false) thread.scrollTop = thread.scrollHeight;
      if (options.skipIfVisible !== false && composeLooksVisible(compose)) return;

      const doScroll = () => {
        const card = box.closest('.case.focused');
        if (card && document.body.classList.contains('focus-mode')) {
          const vvHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
          const keyboardReserve = Math.round(vvHeight * 0.45);
          const visibleArea = Math.max(190, vvHeight - keyboardReserve);
          const bottomGap = options.tight ? -3 : 0;
          const target = Math.max(0, compose.offsetTop + compose.offsetHeight - visibleArea + bottomGap);
          card.scrollTo({ top:target, behavior: options.instant ? 'auto' : 'smooth' });
        } else {
          compose.scrollIntoView({ block:'end', behavior: options.instant ? 'auto' : 'smooth' });
        }
      };
      doScroll();
    }

    function focusComposeCursor(box, forceKeyboard = false) {
      if (!box) return;
      try {
        // v60: prescribed buttons must actually bring up the keyboard on iOS.
        // A normal focus from the tap handler is more reliable than preventScroll.
        if (forceKeyboard) box.focus();
        else box.focus({ preventScroll:true });
        const len = box.value.length;
        if (box.setSelectionRange) box.setSelectionRange(len, len);
      } catch (_) {
        try { box.focus(); } catch (__) {}
      }
    }

    function activateComposeBox(box) {
      if (!box) return;
      clearComposeScrollTimers(box);
      const shell = box.closest('.texting-shell');
      if (shell) {
        shell.classList.remove('collapsed');
        updateMessageShellSubtext(shell);
        const thread = shell.querySelector('.thread');
        if (thread) thread.scrollTop = thread.scrollHeight;
      }
      autosizeReplyBox(box);
      focusComposeCursor(box, true);
      forceQuickReplyComposeVisible(box);
    }

    function forceQuickReplyComposeVisible(box) {
      if (!box) return;
      setKeyboardSpace(box, true);
      const compose = box.closest('.phone-compose') || box;
      const card = box.closest('.case.focused');
      const shell = box.closest('.texting-shell');
      const thread = shell && shell.querySelector('.thread');
      if (shell) shell.classList.remove('collapsed');
      const jump = (instant = true) => {
        autosizeReplyBox(box);
        if (thread) thread.scrollTop = thread.scrollHeight;
        if (card && document.body.classList.contains('focus-mode')) {
          const vvHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
          const rect = compose.getBoundingClientRect();
          const targetBottom = Math.max(170, vvHeight - 8);
          let nextTop = card.scrollTop + (rect.bottom - targetBottom);
          if (!Number.isFinite(nextTop) || nextTop < 0) nextTop = 0;
          // fallback based on actual offset inside the focused case
          const fallbackTop = Math.max(0, compose.offsetTop + compose.offsetHeight - Math.max(200, vvHeight * 0.60));
          nextTop = Math.max(nextTop, fallbackTop);
          card.scrollTo({ top:nextTop, behavior:instant ? 'auto' : 'smooth' });
        } else {
          try { compose.scrollIntoView({ block:'end', behavior:instant ? 'auto' : 'smooth' }); } catch (_) {}
        }
      };
      jump(true);
      requestAnimationFrame(() => jump(true));
      [60, 140, 260, 420, 700, 1000].forEach((delay, i) => setTimeout(() => {
        if (document.activeElement !== box) focusComposeCursor(box, true);
        jump(i < 3);
      }, delay));
    }

    function setupQuickReplyButton(btn) {
      if (!btn || btn.dataset.quickReady === '1') return;
      btn.dataset.quickReady = '1';
      let sx = 0, sy = 0, moved = false, touchHandledUntil = 0;
      btn.addEventListener('touchstart', event => {
        const t = event.changedTouches && event.changedTouches[0];
        if (!t) return;
        sx = t.clientX; sy = t.clientY; moved = false;
      }, { passive:true });
      btn.addEventListener('touchmove', event => {
        const t = event.changedTouches && event.changedTouches[0];
        if (!t) return;
        if (Math.abs(t.clientX - sx) > 8 || Math.abs(t.clientY - sy) > 8) moved = true;
      }, { passive:true });
      btn.addEventListener('touchend', event => {
        if (moved) return;
        touchHandledUntil = Date.now() + 450;
        insertQuickReply(btn, event);
      }, { passive:false });
      btn.addEventListener('click', event => {
        if (Date.now() < touchHandledUntil) {
          event.preventDefault();
          event.stopPropagation();
          return;
        }
        insertQuickReply(btn, event);
      });
    }

    function insertQuickReply(btn, event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
      }
      if (!btn || btn.dataset.inserting === '1') return;
      btn.dataset.inserting = '1';
      setTimeout(() => { if (btn) btn.dataset.inserting = '0'; }, 320);

      const box = document.getElementById(btn.dataset.insertReply);
      if (!box) return;
      const text = btn.dataset.replyText || '';
      const before = box.value || '';
      box.value = before ? (before.replace(/\s*$/, ' ') + text) : text;
      box.dispatchEvent(new Event('input', { bubbles:true }));
      activateComposeBox(box);
    }

    function directComposeFocus(box) {
      if (!box) return;
      const shell = box.closest('.texting-shell');
      if (shell) {
        shell.classList.remove('collapsed');
        updateMessageShellSubtext(shell);
      }
      autosizeReplyBox(box);
      clearComposeScrollTimers(box);
      setKeyboardSpace(box, true);
      keepComposeVisible(box, { tight:true, single:true, skipIfVisible:false, threadBottom:true, instant:true });
      forceQuickReplyComposeVisible(box);
    }


    function setupLocalSendButton(btn) {
      if (!btn || btn.dataset.sendReady === '1') return;
      btn.dataset.sendReady = '1';
      let touchHandledUntil = 0;
      const run = event => {
        touchHandledUntil = Date.now() + 700;
        sendLocalReply(btn, event);
      };
      btn.addEventListener('touchend', run, { passive:false });
      btn.addEventListener('pointerup', event => {
        if (event.pointerType === 'touch') return;
        run(event);
      });
      btn.addEventListener('click', event => {
        if (Date.now() < touchHandledUntil) {
          event.preventDefault();
          event.stopPropagation();
          return;
        }
        sendLocalReply(btn, event);
      });
    }

    async function sendLocalReply(btn, event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
      }
      if (!btn || btn.dataset.sending === '1') return;
      btn.dataset.sending = '1';
      const originalLabel = btn.textContent;
      btn.textContent = 'Sending...';

      const box = document.getElementById(btn.dataset.localSend);
      const thread = document.getElementById(btn.dataset.threadTarget);
      const caseKey = btn.dataset.caseKey;
      const publicId = btn.dataset.publicId || '';
      const text = (box && box.value || '').trim();
      if (!text) {
        if (box) closeComposeSpace(box);
        btn.dataset.sending = '0';
        btn.textContent = originalLabel;
        return;
      }
      if (box) closeComposeSpace(box);

      const now = new Date().toLocaleTimeString([], { hour:'numeric', minute:'2-digit' });
      let savedServerSide = false;
      try {
        const res = await fetch('/.netlify/functions/post-operator-message', {
          method:'POST',
          headers:{ 'Content-Type':'application/json', ...pinHeader() },
          body:JSON.stringify({ id:caseKey, consult_id:caseKey, public_id:publicId, text })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) throw new Error(data.error || 'Could not save operator message');
        savedServerSide = true;
      } catch (err) {
        statusLine.textContent = 'Message kept locally; server save failed: ' + (err.message || err);
      }

      if (!savedServerSide) {
        const local = getLocalThread(caseKey);
        local.push({ who:'operator', text, at:now, server:false });
        saveLocalThread(caseKey, local);
      }
      updateLastMessagePreview(caseKey, text);
      if (thread) thread.insertAdjacentHTML('beforeend', renderMessageBubble({ who:'operator', text, at:now, server:savedServerSide }));
      setLastUndoAction(caseKey, { type:'message', text, at:now });

      try { await navigator.clipboard.writeText(text); } catch (_) {}

      if (box) {
        box.value = '';
        box.dispatchEvent(new Event('input', { bubbles:true }));
        autosizeReplyBox(box);
        settleComposeBottomAfterKeyboard(box);
      }
      if (thread) thread.scrollTop = thread.scrollHeight;
      btn.dataset.sending = '0';
      btn.textContent = originalLabel;
    }

    const AUTO_ARCHIVE_KEY = 'wid_auto_archive_closed_after_week';

    document.getElementById('refreshBtn').onclick = loadConsults;
    const autoArchiveToggleBtn = document.getElementById('autoArchiveToggleBtn');
    if (autoArchiveToggleBtn) autoArchiveToggleBtn.onclick = toggleAutoArchiveClosed;
    document.getElementById('statusFilter').onchange = () => { syncArchiveControlsVisibility(); loadConsults(); };
    pinInput.oninput = () => localStorage.setItem('wid_operator_pin', pinInput.value || '');
    document.addEventListener('keydown', event => {
      if (event.key === 'Escape' && document.body.classList.contains('focus-mode')) {
        event.preventDefault();
        exitFocusMode();
      }
    });

    function syncArchiveControlsVisibility() {
      if (!autoArchiveToggleBtn) return;
      const selected = document.getElementById('statusFilter').value || 'open';
      autoArchiveToggleBtn.style.display = selected === 'closed' ? '' : 'none';
    }

    function syncAutoArchiveButton() {
      if (!autoArchiveToggleBtn) return;
      const on = localStorage.getItem(AUTO_ARCHIVE_KEY) === '1';
      autoArchiveToggleBtn.textContent = on ? 'Auto archive: on' : 'Auto archive: off';
      autoArchiveToggleBtn.classList.toggle('dark', on);
      syncArchiveControlsVisibility();
    }

    function toggleAutoArchiveClosed() {
      const next = localStorage.getItem(AUTO_ARCHIVE_KEY) === '1' ? '0' : '1';
      localStorage.setItem(AUTO_ARCHIVE_KEY, next);
      syncAutoArchiveButton();
      statusLine.textContent = next === '1' ? 'Auto archive enabled for cases closed over 1 week' : 'Auto archive disabled';
      if (next === '1') archiveOldClosedCases({ manual:false });
    }

    async function loadConsults() {
      const selected = document.getElementById('statusFilter').value || 'open';
      statusLine.textContent = 'Loading...';
      list.innerHTML = '';
      try {
        const functionStatus = 'all';
        const res = await fetch('/.netlify/functions/list-consults?status=' + encodeURIComponent(functionStatus) + '&limit=100', { headers: pinHeader() });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) throw new Error(data.error || 'Could not load consults');
        window.__widAllConsults = data.consults || [];
        syncAutoArchiveButton();
        if (localStorage.getItem(AUTO_ARCHIVE_KEY) === '1' && !window.__widAutoArchiveRunning) {
          const didArchive = await archiveOldClosedCases({ manual:false, skipReload:true });
          if (didArchive) return loadConsults();
        }
        const shown = filterConsults(window.__widAllConsults, selected);
        renderConsults(sortConsults(shown), selected);
        const priorityCount = shown.filter(isPriority).length;
        const extendedCount = shown.filter(isExtended).length;
        const normalCount = Math.max(0, shown.length - priorityCount - extendedCount);
        updateTopCounts(priorityCount, normalCount, shown.length, selected, extendedCount);
        statusLine.textContent = `Updated ${new Date().toLocaleTimeString([], { hour:'numeric', minute:'2-digit' })}`;
      } catch (err) {
        list.innerHTML = `<div class="error">${escapeHtml(err.message || String(err))}</div>`;
        statusLine.textContent = 'Load failed';
      }
    }

    function updateTopCounts(priorityCount, normalCount, totalCount, selected, extendedCount = 0) {
      const p = document.getElementById('priorityCount');
      const e = document.getElementById('extendedCount');
      const n = document.getElementById('normalCount');
      const t = document.getElementById('totalCount');
      if (p) p.textContent = String(priorityCount || 0);
      if (e) e.textContent = String(extendedCount || 0);
      if (n) n.textContent = String(normalCount || 0);
      if (t) t.textContent = String(totalCount || 0);
      const normalLabel = document.querySelector('.queue-tile:nth-child(3) .k');
      if (normalLabel) normalLabel.textContent = 'Normal';
      const totalLabel = document.querySelector('.queue-tile:nth-child(4) .k');
      if (totalLabel) totalLabel.textContent = selectedStatusLabel(selected);
    }

    function selectedStatusLabel(selected) {
      const filter = document.getElementById('statusFilter');
      if (filter) {
        const option = Array.from(filter.options || []).find(opt => opt.value === selected);
        if (option && option.textContent) return option.textContent.trim();
      }
      const fallback = {
        open:'Waiting on me',
        waiting_on_customer:'Waiting on cust.',
        closed:'Closed',
        archived:'Archived',
        all:'All'
      };
      return fallback[selected] || 'Shown';
    }

    function filterConsults(items, selected) {
      if (selected === 'archived') return items.filter(isArchived);
      if (selected === 'all') return items.filter(c => !isArchived(c));
      if (selected === 'open') return items.filter(c => !isClosed(c) && !isArchived(c) && String(c.status || '') !== 'waiting_on_customer');
      return items.filter(c => String(c.status || '') === selected && !isArchived(c));
    }

    function sortConsults(items) {
      const statusRank = { waiting_on_me:0, paid_pending:0, waiting_on_customer:2, unpaid:3, draft:4, closed:9, archived:10 };
      return [...items].sort((a,b) => {
        const ap = isPriority(a) ? -10 : (isExtended(a) ? -6 : 0);
        const bp = isPriority(b) ? -10 : (isExtended(b) ? -6 : 0);
        const ar = ap + (statusRank[a.status] ?? 1);
        const br = bp + (statusRank[b.status] ?? 1);
        if (ar !== br) return ar - br;
        return new Date(b.updated_at || b.created_at || 0) - new Date(a.updated_at || a.created_at || 0);
      });
    }


    function updateMessageShellSubtext(shell) {
      if (!shell) return;
      const sub = shell.querySelector('.texting-sub');
      if (sub) sub.textContent = shell.classList.contains('collapsed') ? 'tap to expand' : 'tap to collapse';
    }

    function scrollMessageShellIntoView(shell) {
      if (!shell) return;
      const card = shell.closest('.case.focused');
      const targetTop = Math.max(0, shell.offsetTop - 8);
      if (card && document.body.classList.contains('focus-mode')) {
        requestAnimationFrame(() => card.scrollTo({ top:targetTop, behavior:'smooth' }));
      } else {
        try { shell.scrollIntoView({ block:'start', behavior:'smooth' }); } catch (_) {}
      }
    }

      document.querySelectorAll('.case').forEach(card => {

            if (document.body.classList.contains('focus-mode') && card.classList.contains('focused')) return;
            focusCase(card);
            return;
          }
          registerCaseTap(card, event);
        };
        card.ondblclick = (event) => {
          if (event.target.closest('button,a,audio,textarea,.icon,.bubble,.texting-shell')) return;
          event.preventDefault();
          if (document.body.classList.contains('focus-mode') && card.classList.contains('focused')) exitFocusMode();
          else focusCase(card);
        };
        setupSwipeExit(card);
        setupKeyboardDismiss(card);
      });
      document.querySelectorAll('[data-action-status]').forEach(btn => btn.onclick = (event) => {
        event.preventDefault();
        event.stopPropagation();
        handleStatusButton(btn);
      });
      document.querySelectorAll('[data-open-attachment]').forEach(btn => btn.onclick = (event) => {

        const detailId = btn.dataset.detailId;
        const url = btn.dataset.openAttachment;
        openDetails(detailId);
        if (url) window.open(url, '_blank', 'noopener');
      });
      document.querySelectorAll('[data-copy-reply]').forEach(btn => btn.onclick = async (event) => {

        const box = document.getElementById(btn.dataset.copyReply);
        if (!box) return;
        try { await navigator.clipboard.writeText(box.value || ''); btn.textContent = 'Copied'; setTimeout(() => btn.textContent = 'Copy reply', 1200); }
        catch (_) { box.select(); document.execCommand('copy'); btn.textContent = 'Copied'; setTimeout(() => btn.textContent = 'Copy reply', 1200); }
      });
      document.querySelectorAll('[data-reply-draft]').forEach(box => {

        autosizeReplyBox(box);
        box.oninput = () => {

          autosizeReplyBox(box);
        };
        box.onfocus = () => { directComposeFocus(box); };
        box.onblur = () => { autosizeReplyBox(box); setKeyboardSpace(box, false); };
        box.onclick = (event) => event.stopPropagation();
      });
      document.querySelectorAll('[data-insert-reply]').forEach(btn => {

      document.querySelectorAll('[data-clear-reply]').forEach(btn => btn.onclick = (event) => {

        undoLastOperatorAction(btn);
