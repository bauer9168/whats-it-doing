    let tapTimer = null;
    let lastTappedCase = null;
    let lockedScrollY = 0;

    function isDesktopMouseEvent(event) {
      return event && (event.pointerType === 'mouse' || event.detail >= 0) && window.matchMedia && window.matchMedia('(hover:hover) and (pointer:fine)').matches;
    }

    function registerCaseTap(card, event) {
      const now = Date.now();
      const isFocused = document.body.classList.contains('focus-mode') && card.classList.contains('focused');
      if (lastTappedCase === card && tapTimer && (now - Number(card.dataset.lastTap || 0)) < 360) {
        clearTimeout(tapTimer);
        tapTimer = null;
        if (isFocused) exitFocusMode();
        else focusCase(card);
        return;
      }
      card.dataset.lastTap = String(now);
      lastTappedCase = card;
      tapTimer = setTimeout(() => { tapTimer = null; }, 370);
    }

    function focusCase(card) {
      if (!card) return;
      installViewportSizing();
      lockedScrollY = window.scrollY || window.pageYOffset || 0;
      document.querySelectorAll('.texting-shell.message-zoom').forEach(el => el.classList.remove('message-zoom'));
      document.querySelectorAll('.case.focused').forEach(el => el.classList.remove('focused'));
      card.classList.add('focused');
      document.body.classList.add('focus-mode');
      document.body.style.top = '-' + lockedScrollY + 'px';
      recenterShell();
      lockBlueBrowserBarsSoon();
      openDetails(card.dataset.detailId);
      setTimeout(() => card.scrollTo({ top:0, behavior:'auto' }), 0);
    }

    function exitFocusMode(options = {}) {
      const focusedCards = Array.from(document.querySelectorAll('.case.focused'));
      document.querySelectorAll('.texting-shell.message-zoom').forEach(el => el.classList.remove('message-zoom'));
      document.querySelectorAll('textarea').forEach(box => box.blur());
      focusedCards.forEach(card => {
        card.querySelectorAll('.details.open').forEach(detail => detail.classList.remove('open'));
        card.querySelectorAll('.texting-shell').forEach(shell => shell.classList.remove('message-zoom'));
        card.classList.remove('keyboard-space');
        document.body.classList.remove('keyboard-active');
        card.scrollTop = 0;
        card.classList.remove('focused');
      });
      document.body.classList.remove('focus-mode');
      document.body.style.top = '';
      recenterShell();
      lockBlueBrowserBarsSoon();
      if (options.restoreScroll !== false) window.scrollTo(0, lockedScrollY || 0);
      requestAnimationFrame(() => {
        recenterShell();
      });
      lastTappedCase = null;
      if (tapTimer) { clearTimeout(tapTimer); tapTimer = null; }
    }

    function toggleMessageZoom(shell) {
      if (!shell) return;
      const card = shell.closest('.case');
      if (card && !document.body.classList.contains('focus-mode')) focusCase(card);
      installViewportSizing();
      shell.classList.remove('collapsed');
      const willOpen = !shell.classList.contains('message-zoom');
      document.querySelectorAll('.texting-shell.message-zoom').forEach(el => el.classList.remove('message-zoom'));
      if (willOpen) {
        shell.classList.add('message-zoom');
        lockBlueBrowserBarsSoon();
        const thread = shell.querySelector('.thread');
        if (thread) thread.scrollTop = thread.scrollHeight;
      }
    }

    function setupSwipeExit(el, callback) {
      if (!el || el.dataset.swipeReady === '1') return;
      el.dataset.swipeReady = '1';
      let startX = 0, startY = 0;
      el.addEventListener('touchstart', e => {
        const t = e.changedTouches && e.changedTouches[0];
        if (!t) return;
        startX = t.clientX; startY = t.clientY;
      }, { passive:true });
      el.addEventListener('touchend', e => {
        const t = e.changedTouches && e.changedTouches[0];
        if (!t) return;
        const dx = t.clientX - startX;
        const dy = t.clientY - startY;
        if (dx < -70 && Math.abs(dx) > Math.abs(dy) * 1.4) {
          if (callback) callback();
          else exitFocusMode();
        }
      }, { passive:true });
    }

    function setupKeyboardDismiss(card) {
      if (!card || card.dataset.keyboardDismissReady === '1') return;
      card.dataset.keyboardDismissReady = '1';
      let startTarget = null;
      card.addEventListener('touchstart', e => {
        startTarget = e.target;
      }, { passive:true });
      card.addEventListener('touchmove', e => {
        dismissKeyboardFromOuterScroll(startTarget || e.target);
      }, { passive:true });
      card.addEventListener('wheel', e => {
        dismissKeyboardFromOuterScroll(e.target);
      }, { passive:true });
    }

    function clampScrollEdges(el) {
      if (!el || el.dataset.clampReady === '1') return;
      el.dataset.clampReady = '1';
      let lastY = 0;
      el.addEventListener('touchstart', e => {
        const t = e.touches && e.touches[0];
        if (t) lastY = t.clientY;
      }, { passive:true });
      el.addEventListener('touchmove', e => {
        if (!document.body.classList.contains('focus-mode')) return;
        const t = e.touches && e.touches[0];
        if (!t) return;
        const dy = t.clientY - lastY;
        lastY = t.clientY;
        const atTop = el.scrollTop <= 0;
        const atBottom = Math.ceil(el.scrollTop + el.clientHeight) >= el.scrollHeight;
        if ((atTop && dy > 0) || (atBottom && dy < 0)) e.preventDefault();
      }, { passive:false });
    }

    function toggleDetails(detailId) {
      const el = document.getElementById(detailId);
      if (!el) return;
      el.classList.toggle('open');
    }

    function openDetails(detailId) {
      const el = document.getElementById(detailId);
      if (el) el.classList.add('open');
    }

    function renderCase(c, index, queueMeta, selectedView = 'open') {
      const caseNo = formatCaseNumber(c, index, queueMeta);
      const created = c.created_at ? new Date(c.created_at).toLocaleString([], { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' }) : '';
      const name = c.customer_name || 'Name missing';
      const vehicle = c.vehicle_summary || compactVehicle(c) || 'Vehicle not clear';
      const issue = c.issue_summary || 'Symptom not clear';
      const status = c.status || 'waiting_on_me';
      const detailId = `detail-${index}`;
      const files = Array.isArray(c.file_links) ? c.file_links : [];
      const imageFiles = files.filter(f => /^image\//.test(f.type || '') || looksLikeImage(f.name || f.path || ''));
      const otherFiles = files.filter(f => !( /^image\//.test(f.type || '') || looksLikeImage(f.name || f.path || '') ));
      const hasVoice = !!c.voice_note_url;
      const priority = isPriority(c);
      const extended = isExtended(c);
      const statusKey = String(status || '').toLowerCase();
      const waitingOnMeVisual = statusKey === 'waiting_on_me' || statusKey === 'paid_pending';
      const queueType = priority ? 'priority' : (extended ? 'extended' : 'normal');
      const pos = queueMeta.positions[getCaseKey(c, index)] || (index + 1);
      const total = queueMeta.total || itemsTotalFallback(queueMeta);
      const queueLabel = `${priority ? 'Priority' : (extended ? 'Extended' : 'Normal')} · ${pos} of ${total}`;
      const showQueueLabel = selectedView === 'open';
      const archived = isArchived(c);
      const actionLabel = (isClosed(c) || archived) ? 'Reopen case' : 'Close case';
      const actionStatus = (isClosed(c) || archived) ? 'waiting_on_me' : 'closed';
      const actionClass = (isClosed(c) || archived) ? 'reopen-case' : 'close-case';
      const archiveButton = isClosed(c) ? `<button class="archive-btn" data-action-status="archived" data-id="${escapeAttr(c.id)}" data-case-no="${escapeAttr(caseNo)}" type="button">Archive case</button>` : '';
      const isWaitingOnCustomer = String(status || '').toLowerCase() === 'waiting_on_customer';
      const waitingActionLabel = isWaitingOnCustomer ? 'Waiting on me' : 'Waiting on cust.';
      const waitingActionStatus = isWaitingOnCustomer ? 'waiting_on_me' : 'waiting_on_customer';
      const firstVoiceUrl = c.voice_note_url || '';
      const firstImageUrl = (imageFiles.find(f => f.url) || {}).url || '';
      const firstFileUrl = (otherFiles.find(f => f.url) || {}).url || '';
      const attachmentIcons = renderAttachmentIcons({ detailId, firstVoiceUrl, firstImageUrl, firstFileUrl });
      const replyId = `reply-${escapeAttr(c.id || index)}`;
      const preview = getLastMessagePreview(c, index);
      const caseKey = getCaseKey(c, index);
      return `
        <section class="case ${priority ? 'priority' : ''} ${extended ? 'extended' : ''} ${waitingOnMeVisual ? 'waiting-me' : ''}" data-thread-id="${escapeAttr(c.id)}" data-case-key="${escapeAttr(caseKey)}" data-detail-id="${detailId}">
          <div class="case-head">
            <div class="left-lines">
              <div class="customer-name">${escapeHtml(name)}</div>
              <div class="vehicle-line">${escapeHtml(vehicle)}</div>
              <div class="symptom-line">${escapeHtml(issue)}</div>
              <div class="meta">${escapeHtml(created)} · <span class="status-label">${escapeHtml(effectiveStatusLabel(status))}</span></div>
              <div class="last-message-preview" data-last-preview="${escapeAttr(caseKey)}" ${preview ? '' : 'style="display:none"'}>${preview ? escapeHtml(preview) : ''}</div>
            </div>
            <div class="right-stack">
              <div class="case-number">#${escapeHtml(caseNo)}</div>
              ${showQueueLabel ? `<span class="queue-badge ${queueType}">${escapeHtml(queueLabel)}</span>` : ''}
              ${attachmentIcons}
            </div>
          </div>
          <div class="details" id="${detailId}">
            <div class="label">Summary</div>
            <div class="box"><strong>Issue:</strong> ${escapeHtml(c.issue_summary || '')}\n\n<strong>What has been done:</strong> ${escapeHtml(c.work_done_summary || '')}</div>
            <div class="label">Original intake</div>
            <div class="box">${escapeHtml(c.intake_text || '')}</div>
            <div class="label">Additional details</div>
            <div class="box">${escapeHtml(c.followup_text || 'None')}</div>
            ${renderPhone(c)}
            ${renderFiles(c)}
            <div class="workflow-actions wid-v58-workflow">
              <button class="${actionClass}" data-action-status="${actionStatus}" data-id="${escapeAttr(c.id)}" data-case-no="${escapeAttr(caseNo)}">${actionLabel}</button>
              <button class="waiting-btn" data-action-status="${escapeAttr(waitingActionStatus)}" data-id="${escapeAttr(c.id)}" data-case-no="${escapeAttr(caseNo)}">${escapeHtml(waitingActionLabel)}</button>
              <button class="reset-btn" data-clear-waiting-workflow="1" data-id="${escapeAttr(c.id)}" data-case-no="${escapeAttr(caseNo)}" type="button" aria-label="Clear active autoclose timer">Clear timer</button>
              <button class="undo-btn" data-undo-action="1" data-id="${escapeAttr(c.id)}" data-case-no="${escapeAttr(caseNo)}" type="button" aria-label="Undo last timer reset or local message">Undo</button>
              ${archiveButton}
            </div>
            ${renderTextingPanel(c, index, replyId)}
          </div>
        </section>`;
    }


    function renderTextingPanel(c, index, replyId) {
      const threadId = `thread-${index}`;
      const key = escapeAttr(c.id || c.public_id || c.case_id || index);
      const publicKey = escapeAttr(c.public_id || c.case_number || c.reference || '');
      return `
        <div class="texting-shell" data-case-key="${key}" data-public-id="${publicKey}">
          <div class="texting-head">
            <div class="texting-title">Messages</div>
            <div class="texting-sub">tap to collapse</div>
          </div>
          <div class="thread" id="${threadId}">${renderThreadBubbles(c, index)}</div>
          <div class="autoclose-thread-note ${getWaitingWorkflow(c.id || index) ? 'active' : ''}" data-autoclose-note="${key}">48hr autoclose active</div>
          <div class="quick-replies wid-v58-quick" aria-label="reply starters">
            <button type="button" tabindex="-1" data-insert-reply="${replyId}" data-reply-text="Hello, my name is Bryan, ">Hello..</button>
            <button type="button" tabindex="-1" data-insert-reply="${replyId}" data-reply-text="I’d check ">I’d check</button>
            <button type="button" tabindex="-1" data-insert-reply="${replyId}" data-reply-text="I’m not sure ">I’m not sure</button>
            <button type="button" tabindex="-1" data-insert-reply="${replyId}" data-reply-text="Can you elaborate?">Elaborate?</button>
            <button type="button" tabindex="-1" data-insert-reply="${replyId}" data-reply-text="What code was it?">Code?</button>
            <button type="button" tabindex="-1" data-insert-reply="${replyId}" data-reply-text="Does that make sense?">Make sense?</button>
          </div>
          <div class="phone-compose">
            <textarea id="${replyId}" data-reply-draft="${key}" data-thread-target="${threadId}" placeholder="Type message..."></textarea>
            <div class="phone-buttons">
              <button class="photo-btn wid-v58-photo" type="button" data-picture-pick="pic-${replyId}" aria-label="Add photo to message">Photo</button>
              <button type="button" data-clear-reply="${replyId}">Clear</button>
              <button type="button" class="send" data-local-send="${replyId}" data-case-key="${key}" data-public-id="${publicKey}" data-thread-target="${threadId}">Send</button>
              <input id="pic-${replyId}" data-picture-input="1" data-case-key="${key}" data-public-id="${publicKey}" data-thread-target="${threadId}" type="file" accept="image/*,.heic,.heif,.jpg,.jpeg,.png,.webp" multiple style="display:none" />
            </div>
          </div>
        </div>`;
    }

    function formatMessageTime(value) {
      if (!value) return '';
      const d = new Date(value);
      if (!Number.isNaN(d.getTime())) {
        return d.toLocaleString([], { month:'numeric', day:'numeric', hour:'numeric', minute:'2-digit' });
      }
      return String(value).replace(/\.\d{3}Z$/, '').replace('T', ' ').slice(0, 16);
    }

    function looksLikeAudioAttachment(type, url, name) {
      const hay = `${type || ''} ${url || ''} ${name || ''}`.toLowerCase();
      return hay.includes('audio/') || hay.startsWith('data:audio') || /\.(webm|mp3|m4a|mp4|wav|ogg|aac)(?:$|[?#])/i.test(hay);
    }

    function looksLikeImageAttachment(type, url, name) {
      const hay = `${type || ''} ${url || ''} ${name || ''}`.toLowerCase();
      return hay.includes('image/') || hay.startsWith('data:image') || /\.(jpe?g|png|gif|webp|heic|heif)(?:$|[?#])/i.test(hay);
    }

    function renderBubbleAttachmentHtml({ attachmentType, directImage, attachmentUrl, attachmentName }) {
      if (directImage || (attachmentUrl && looksLikeImageAttachment(attachmentType, attachmentUrl, attachmentName))) {
        const src = directImage || attachmentUrl;
        return `<img class="bubble-image-thumb" src="${escapeAttr(src)}" alt="${escapeAttr(attachmentName || 'attached image')}" data-expand-image="${escapeAttr(src)}" />`;
      }
      if (attachmentUrl && looksLikeAudioAttachment(attachmentType, attachmentUrl, attachmentName)) {
        return `<div class="pathline">Audio note</div><audio controls preload="metadata" src="${escapeAttr(attachmentUrl)}" style="width:100%;margin-top:7px;"></audio><a href="${escapeAttr(attachmentUrl)}" target="_blank" rel="noopener" style="display:block;margin-top:5px;font-size:11px;font-weight:850;color:inherit;">Open audio</a>`;
      }
      if (attachmentUrl) {
        return `<a href="${escapeAttr(attachmentUrl)}" target="_blank" rel="noopener" style="display:block;margin-top:7px;font-weight:850;color:inherit;">Open ${escapeHtml(attachmentName || 'attachment')}</a>`;
      }
      return '';
    }

    function renderThreadBubbles(c, index) {
      const parts = [];
      const serverMessages = Array.isArray(c.messages) ? c.messages : [];
      if (serverMessages.length) {
        serverMessages.forEach(m => parts.push(renderMessageBubble(m)));
      } else {
        const intro = [c.intake_text, c.followup_text].filter(Boolean).join('\n\n');
        if (intro) parts.push(`<div class="bubble customer">${escapeHtml(intro)}<span class="bubble-meta">customer</span></div>`);
      }

      const alreadyHasAudio = serverMessages.some(m => {
        const type = String((m && (m.attachment_type || m.attachmentType)) || '').toLowerCase();
        const url = m && (m.attachment_url || m.attachmentUrl || '');
        const name = m && (m.attachment_name || m.attachmentName || m.image_name || m.imageName || '');
        return looksLikeAudioAttachment(type, url, name);
      });
      const voiceUrl = c.voice_note_url || c.voiceNoteUrl || c.voice_url || '';
      if (voiceUrl && !alreadyHasAudio) {
        parts.push(renderMessageBubble({ who:'customer', text:'Original submission audio note', attachment_type:'audio', attachment_url:voiceUrl, attachment_name:'customer-audio-note', at:'submitted' }));
      }

      const local = getLocalThread(c.id || index);
      local.forEach(m => parts.push(renderMessageBubble(m)));
      if (!parts.length) parts.push('<div class="bubble system">No message text saved yet.</div>');
      return parts.join('');
    }

    function renderMessageBubble(m) {
      const rawWho = String((m && (m.who || m.sender)) || 'operator').toLowerCase();
      const who = rawWho === 'system' ? 'system' : (rawWho === 'info' ? 'info' : (rawWho === 'customer' ? 'customer' : 'operator'));
      const rawAt = (m && (m.at || m.created_at)) || '';
      const prettyAt = rawAt === 'submitted' ? 'submitted' : formatMessageTime(rawAt);
      const meta = who === 'system' || who === 'info'
        ? (prettyAt || who)
        : (who === 'customer' ? ['customer', prettyAt].filter(Boolean).join(' · ') : ['you', prettyAt].filter(Boolean).join(' · '));
      const text = escapeHtml((m && (m.text || m.body)) || '');
      const attachmentType = String((m && (m.attachment_type || m.attachmentType)) || '').toLowerCase();
      const directImage = m && (m.imageData || m.image_data || m.image_url || '');
      const attachmentUrl = m && (m.attachment_url || m.attachmentUrl || '');
      const attachmentName = m && (m.imageName || m.image_name || m.attachment_name || m.attachmentName || 'attachment');
      const attachmentHtml = renderBubbleAttachmentHtml({ attachmentType, directImage, attachmentUrl, attachmentName });
      return `<div class="bubble ${who}">${text}${attachmentHtml}${meta ? `<span class="bubble-meta">${escapeHtml(meta)}</span>` : ''}</div>`;
    }

    function getLastMessagePreview(c, index) {
      const caseKey = c.id || index;
      const wf = getWaitingWorkflow(caseKey);
      const local = getLocalThread(caseKey);
      const operatorQuestion = lastOperatorText(caseKey);
      if (wf && operatorQuestion) {
        return `Last: ${firstWords(operatorQuestion, 4)} · Autoclose: ${formatAutocloseCountdown(wf.closeAt)}`;
      }
      const serverMessages = Array.isArray(c.messages) ? c.messages : [];
      const last = local.length ? local[local.length - 1] : (serverMessages.length ? serverMessages[serverMessages.length - 1] : null);
      const raw = last ? (last.text || last.body || (last.imageData ? 'Picture attached' : (looksLikeAudioAttachment(last.attachment_type || last.attachmentType, last.attachment_url || last.attachmentUrl, last.attachment_name || last.attachmentName) ? 'Audio note' : ''))) : (c.last_message || c.last_message_body || c.latest_message || c.operator_reply || '');
      const text = String(raw || '').replace(/\s+/g, ' ').trim();
      if (!text) return '';
      const words = text.split(' ').slice(0, 9).join(' ');
      return 'Last: ' + words + (text.length > words.length ? '…' : '');
    }

    function updateLastMessagePreview(caseKey, text) {
      const clean = String(text || '').replace(/\s+/g, ' ').trim();
      const wf = getWaitingWorkflow(caseKey);
      let preview = '';
      if (wf && clean) {
        preview = `Last: ${firstWords(clean, 4)} · Autoclose: ${formatAutocloseCountdown(wf.closeAt)}`;
      } else if (clean) {
        const words = clean.split(' ').slice(0, 9).join(' ');
        preview = 'Last: ' + words + (clean.length > words.length ? '…' : '');
      }
      document.querySelectorAll(`[data-last-preview="${cssEscape(caseKey)}"]`).forEach(el => {
        el.textContent = preview;
        el.style.display = preview ? '' : 'none';
      });
    }

    function cssEscape(v) {
      if (window.CSS && CSS.escape) return CSS.escape(String(v));
      return String(v).replace(/[^a-zA-Z0-9_-]/g, '\$&');
    }

    function getLocalThread(caseKey) {
      try { return JSON.parse(localStorage.getItem('wid_thread_' + caseKey) || '[]') || []; }
      catch (_) { return []; }
    }

    function saveLocalThread(caseKey, messages) {
      localStorage.setItem('wid_thread_' + caseKey, JSON.stringify(messages || []));
    }


    function renderAttachmentIcons({ detailId, firstVoiceUrl, firstImageUrl, firstFileUrl }) {
      const parts = [];
      if (firstVoiceUrl) parts.push(`<span class="icon on" title="Open voice note" data-open-attachment="${escapeAttr(firstVoiceUrl)}" data-detail-id="${detailId}">🎙</span>`);
      if (firstImageUrl) parts.push(`<span class="icon on" title="Open picture" data-open-attachment="${escapeAttr(firstImageUrl)}" data-detail-id="${detailId}">📷</span>`);
      if (firstFileUrl) parts.push(`<span class="icon on" title="Open uploaded file" data-open-attachment="${escapeAttr(firstFileUrl)}" data-detail-id="${detailId}">📎</span>`);
      return parts.length ? `<div class="icons" aria-label="attachments">${parts.join('')}</div>` : '';
    }


    function buildQueueMeta(items) {
      const positions = {};
      const caseNumbers = {};
      items.forEach((c, index) => {
        positions[getCaseKey(c, index)] = index + 1;
      });
      const all = Array.isArray(window.__widAllConsults) && window.__widAllConsults.length ? window.__widAllConsults : items;
      [...all]
        .sort((a,b) => new Date(a.created_at || a.paid_at || a.updated_at || 0) - new Date(b.created_at || b.paid_at || b.updated_at || 0))
        .forEach((c, index) => { caseNumbers[getCaseKey(c, index)] = index + 1; });
      return { total: items.length, positions, caseNumbers };
    }

    function itemsTotalFallback(queueMeta) {
      if (!queueMeta || !queueMeta.positions) return 1;
      return Object.keys(queueMeta.positions).length || 1;
    }

    function getCaseKey(c, index) {
      return String(c.id || c.case_number || c.consult_number || c.ticket_number || index);
    }

    function openThread(id) {
      if (!id) return;
      window.location.href = '/thread.html?id=' + encodeURIComponent(id);
    }

    function formatCaseNumber(c, index, queueMeta) {
      const raw = c.case_number ?? c.consult_number ?? c.ticket_number ?? c.sequence_number;
      const n = Number(raw);
      if (Number.isFinite(n) && n > 0) return String(n).padStart(4, '0').slice(-4);
      const key = getCaseKey(c, index);
      const globalN = queueMeta && queueMeta.caseNumbers ? Number(queueMeta.caseNumbers[key]) : NaN;
      if (Number.isFinite(globalN) && globalN > 0) return String(globalN).padStart(4, '0').slice(-4);
      return '----';
    }

    function compactVehicle(c) {
      return [c.year, c.make, c.model].filter(Boolean).join(' ');
    }

    function isExtended(c) {
      const raw = String(c.queue_type || c.consult_type || c.priority || c.product || c.plan || '').toLowerCase();
      return raw.includes('extended') || raw.includes('3 day') || raw.includes('3-day') || raw.includes('three day');
    }

    function isPriority(c) {
      const raw = String(c.queue_type || c.consult_type || c.priority || '').toLowerCase();
      return raw.includes('priority') || raw.includes('rush') || raw.includes('urgent');
    }

    function isClosed(c) { return String(c.status || '').toLowerCase() === 'closed'; }
    function isArchived(c) { return String(c.status || '').toLowerCase() === 'archived'; }

    function effectiveStatusLabel(status) {
      const map = {
        unpaid:'Waiting on me',
        paid_pending:'Waiting on me',
        waiting_on_me:'Waiting on me',
        waiting_on_customer:'Waiting on cust.',
        closed:'Closed',
        archived:'Archived',
        draft:'Draft'
      };
      return map[status] || status || 'Waiting on me';
    }


    function renderPhone(c) {
      const raw = c.customer_phone || c.phone || c.phone_number || '';
      const clean = String(raw || '').replace(/[^\d+]/g, '');
      if (!raw || !clean) return '';
      return `<div class="label">Contact</div><a class="call-btn" href="tel:${escapeAttr(clean)}">Call ${escapeHtml(raw)}</a>`;
    }

    function renderVoice(c) {
      if (!c.voice_note_path) return '<div class="label">Voice note</div><div class="box muted">No voice note saved.</div>';
      if (!c.voice_note_url) return `<div class="label">Voice note</div><div class="box">Path saved, but no playable URL returned.<span class="pathline">${escapeHtml(c.voice_note_path)}</span></div>`;
      return `<div class="label">Voice note</div><audio controls src="${escapeAttr(c.voice_note_url)}"></audio><a class="filelink" target="_blank" rel="noopener" href="${escapeAttr(c.voice_note_url)}">Open voice note</a><span class="pathline">${escapeHtml(c.voice_note_path)}</span>`;
    }

    function renderFiles(c) {
      const files = (Array.isArray(c.file_links) ? c.file_links : []).filter(f => f && f.url);
      if (!files.length) return '';
      return '<div class="label">Uploads</div><div class="uploads-list">' + files.map((f, i) => {
        const fileName = f.name || f.path || 'upload';
        const label = looksLikeImage(fileName) || /^image\//.test(f.type || '') ? `Open photo${files.length > 1 ? ' ' + (i + 1) : ''}` : `Open file${files.length > 1 ? ' ' + (i + 1) : ''}`;
        return `<div class="upload-row"><a target="_blank" rel="noopener" href="${escapeAttr(f.url)}">${label}</a></div>`;
      }).join('') + '</div>';
    }

    function looksLikeImage(name) { return /\.(png|jpe?g|gif|webp|heic|heif)$/i.test(String(name || '')); }

    async function ensureNotificationPermission() {
      if (!('Notification' in window)) return false;
      if (Notification.permission === 'granted') return true;
      if (Notification.permission === 'denied') return false;
      try { return (await Notification.requestPermission()) === 'granted'; }
      catch (_) { return false; }
    }

    function notifyOperator(title, body) {
      if ('Notification' in window && Notification.permission === 'granted') {
        try { new Notification(title, { body }); return; } catch (_) {}
      }
      try { alert(title + '\n\n' + body); } catch (_) {}
    }

    function getWaitingWorkflow(caseKey) {
      if (!caseKey) return null;
      try { return JSON.parse(localStorage.getItem('wid_waiting_workflow_' + String(caseKey)) || 'null'); }
      catch (_) { return null; }
    }

    function formatAutocloseCountdown(closeAt) {
      const end = Number(closeAt || 0);
      if (!end) return '';
      const ms = Math.max(0, end - Date.now());
      const totalMinutes = Math.ceil(ms / 60000);
      const hours = Math.floor(totalMinutes / 60);
      const minutes = totalMinutes % 60;
      if (hours <= 0) return `${minutes}m`;
      return `${hours}h ${String(minutes).padStart(2, '0')}m`;
    }

    function getAutocloseCountdown(caseKey) {
      const wf = getWaitingWorkflow(caseKey);
      if (!wf || !wf.closeAt) return '';
      return formatAutocloseCountdown(wf.closeAt);
    }

    function firstWords(text, count = 4) {
      return String(text || '').replace(/\s+/g, ' ').trim().split(' ').filter(Boolean).slice(0, count).join(' ');
    }

    function lastOperatorText(caseKey) {
      const local = getLocalThread(caseKey);
      for (let i = local.length - 1; i >= 0; i--) {
        if (local[i] && local[i].who === 'operator' && local[i].text) return local[i].text;
      }
      return '';
    }

    function updateAutocloseUi(caseKey) {
      if (!caseKey) return;
      const wf = getWaitingWorkflow(caseKey);
      const countdown = wf ? formatAutocloseCountdown(wf.closeAt) : '';
      document.querySelectorAll(`[data-autoclose-note="${cssEscape(caseKey)}"]`).forEach(el => {
        el.textContent = '48hr autoclose active';
        el.classList.toggle('active', !!wf);
      });
      document.querySelectorAll(`[data-autoclose-countdown="${cssEscape(caseKey)}"]`).forEach(el => {
        el.textContent = countdown;
      });
      const text = lastOperatorText(caseKey);
      if (wf && text) updateLastMessagePreview(caseKey, text);
      else if (!wf) {
        const local = getLocalThread(caseKey);
        const last = [...local].reverse().find(m => m && (m.text || m.imageData));
        updateLastMessagePreview(caseKey, last ? (last.text || 'Picture attached') : '');
      }
    }

    function refreshAllAutocloseCountdowns() {
      document.querySelectorAll('[data-case-key]').forEach(el => updateAutocloseUi(el.dataset.caseKey));
    }

    function renderWaitingTimerSummary(caseKey) {
      const wf = getWaitingWorkflow(caseKey);
      if (!wf || !wf.started) return '';
      const left = formatAutocloseCountdown(wf.closeAt);
      return `

<div class="timer-summary">Autoclose: <span class="autoclose-countdown" data-autoclose-countdown="${escapeAttr(caseKey)}">${escapeHtml(left)}</span></div>`;
    }

    function appendSystemMessage(caseKey, thread, text) {
      if (!caseKey || !text) return;
      const now = new Date().toLocaleString([], { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });
      const local = getLocalThread(caseKey);
      local.push({ who:'system', text, at:now });
      saveLocalThread(caseKey, local);
      if (thread) {
        thread.insertAdjacentHTML('beforeend', renderMessageBubble({ who:'system', text, at:now }));
        thread.scrollTop = thread.scrollHeight;
      }
    }

    function setLastUndoAction(caseKey, action) {
      if (!caseKey || !action) return;
      localStorage.setItem('wid_last_undo_' + String(caseKey), JSON.stringify({ ...action, savedAt:Date.now() }));
    }

    function getLastUndoAction(caseKey) {
      try { return JSON.parse(localStorage.getItem('wid_last_undo_' + String(caseKey)) || 'null'); }
      catch (_) { return null; }
    }

    function setLastTimerUndo(caseKey, action) {
      if (!caseKey || !action) return;
      localStorage.setItem('wid_last_timer_undo_' + String(caseKey), JSON.stringify({ ...action, savedAt:Date.now() }));
    }

    function getLastTimerUndo(caseKey) {
      try { return JSON.parse(localStorage.getItem('wid_last_timer_undo_' + String(caseKey)) || 'null'); }
      catch (_) { return null; }
    }

    function clearWaitingTimerHandles(caseKey) {
      const store = window.__widWaitingTimers || {};
      const timers = store[String(caseKey)] || [];
      timers.forEach(id => clearTimeout(id));
      store[String(caseKey)] = [];
      window.__widWaitingTimers = store;
    }

    function rememberWaitingTimerHandle(caseKey, id) {
      if (!caseKey || !id) return;
      const store = window.__widWaitingTimers || {};
      store[String(caseKey)] = store[String(caseKey)] || [];
      store[String(caseKey)].push(id);
      window.__widWaitingTimers = store;
    }

    function undoTimerReset(caseKey, thread) {
      const action = getLastTimerUndo(caseKey) || getLastUndoAction(caseKey);
      if (!action || action.type !== 'reset_timer') return false;
      const key = 'wid_waiting_workflow_' + String(caseKey);
      clearWaitingTimerHandles(caseKey);
      if (action.prevWorkflowRaw) {
        localStorage.setItem(key, action.prevWorkflowRaw);
        try {
          const old = JSON.parse(action.prevWorkflowRaw);
          scheduleWaitingTimeouts(old.id, caseKey, old.caseNo, thread, old.started, old.halfAt, old.closeAt);
        } catch (_) {}
      } else {
        localStorage.removeItem(key);
      }
      removeTimerSystemMessages(caseKey, thread);
      localStorage.removeItem('wid_last_timer_undo_' + String(caseKey));
      const last = getLastUndoAction(caseKey);
      if (last && last.type === 'reset_timer') localStorage.removeItem('wid_last_undo_' + String(caseKey));
      statusLine.textContent = 'Timer reset undone';
      return true;
    }

    function isTimerSystemMessage(m) {
      const text = String((m && m.text) || '');
      return !!(m && m.who === 'system' && (
        text.includes('Waiting timer reset') ||
        text.includes('Waiting on customer started') ||
        text.includes('Reminder at 24 hours') ||
        text.includes('auto-close target') ||
        text.includes('24-hour reminder') ||
        text.includes('48-hour close point reached') ||
        text.includes('Auto-close point reached')
      ));
    }

    function removeTimerSystemMessages(caseKey, thread) {
      const local = getLocalThread(caseKey);
      let removed = false;
      for (let i = local.length - 1; i >= 0; i--) {
        if (isTimerSystemMessage(local[i])) {
          local.splice(i, 1);
          removed = true;
          break;
        }
      }
      if (removed) saveLocalThread(caseKey, local);
      if (thread) {
        const systemBubbles = Array.from(thread.querySelectorAll('.bubble.system'));
        const timerBubble = systemBubbles.reverse().find(b => isTimerSystemMessage({ who:'system', text:b.textContent || '' }));
        if (timerBubble) timerBubble.remove();
        else removeLastSystemBubble(thread);
      }
    }

    function undoLastOperatorAction(btn) {
      const card = btn.closest('.case');
      const shell = card && card.querySelector('.texting-shell');
      const thread = card && card.querySelector('.thread');
      const caseKey = shell ? shell.dataset.caseKey : btn.dataset.id;
      if (!caseKey) return;
      if (undoTimerReset(caseKey, thread)) return;
      const local = getLocalThread(caseKey);
      for (let i = local.length - 1; i >= 0; i--) {
        if (local[i] && local[i].who === 'operator') {
          local.splice(i, 1);
          saveLocalThread(caseKey, local);
          removeLastOperatorBubble(thread);
          const last = [...local].reverse().find(m => m && (m.text || m.imageData));
          updateLastMessagePreview(caseKey, last ? (last.text || 'Picture attached') : '');
          localStorage.removeItem('wid_last_undo_' + String(caseKey));
          statusLine.textContent = 'Last operator message undone';
          return;
        }
      }
      statusLine.textContent = 'Nothing to undo for this case';
    }

    function removeLastOperatorBubble(thread) {
      if (!thread) return;
      const bubbles = Array.from(thread.querySelectorAll('.bubble.operator'));
      const last = bubbles[bubbles.length - 1];
      if (last) last.remove();
    }

    function removeLastSystemBubble(thread) {
      if (!thread) return;
      const bubbles = Array.from(thread.querySelectorAll('.bubble.system'));
      const last = bubbles[bubbles.length - 1];
      if (last) last.remove();
    }

    function openMessageImage(src) {
      if (!src) return;
      const old = document.querySelector('.message-image-modal');
      if (old) old.remove();
      const modal = document.createElement('div');
      modal.className = 'message-image-modal';
      modal.innerHTML = `<button class="close-image" type="button">Close</button><img src="${escapeAttr(src)}" alt="message picture" />`;
      modal.onclick = () => modal.remove();
      const btn = modal.querySelector('.close-image');
      if (btn) btn.onclick = (event) => { event.stopPropagation(); modal.remove(); };
      document.body.appendChild(modal);
    }

    function resizeOperatorImageFile(file, maxSide = 900, quality = 0.58) {
      return new Promise((resolve) => {
        if (!file || !file.type || !file.type.startsWith('image/')) return resolve(file);
        const img = new Image();
        const objectUrl = URL.createObjectURL(file);
        img.onload = () => {
          try {
            let width = img.naturalWidth || img.width;
            let height = img.naturalHeight || img.height;
            const scale = Math.min(1, maxSide / Math.max(width, height));
            width = Math.max(1, Math.round(width * scale));
            height = Math.max(1, Math.round(height * scale));
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            canvas.toBlob((blob) => {
              URL.revokeObjectURL(objectUrl);
              if (!blob) return resolve(file);
              const safeBase = String(file.name || 'picture').replace(/\.[^.]+$/, '') || 'picture';
              resolve(new File([blob], safeBase + '.jpg', { type:'image/jpeg' }));
            }, 'image/jpeg', quality);
          } catch (err) {
            URL.revokeObjectURL(objectUrl);
            resolve(file);
          }
        };
        img.onerror = () => {
          URL.revokeObjectURL(objectUrl);
          resolve(file);
        };
        img.src = objectUrl;
      });
    }

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ''));
        reader.onerror = () => reject(reader.error || new Error('Could not read picture'));
        reader.readAsDataURL(file);
      });
    }

    async function handlePictureInput(input) {
      const files = Array.from(input.files || []).filter(file => /^image\//.test(file.type || '') || /\.(heic|heif|jpe?g|png|gif|webp)$/i.test(file.name || ''));
      input.value = '';
      if (!files.length) {
        statusLine.textContent = 'Only image files can be attached here';
        return;
      }
      const caseKey = input.dataset.caseKey;
      const publicId = input.dataset.publicId || '';
      const thread = document.getElementById(input.dataset.threadTarget);
      let added = 0;
      for (const originalFile of files) {
        try {
          const file = await resizeOperatorImageFile(originalFile);
          const dataUrl = await fileToDataUrl(file);
          if (!dataUrl) throw new Error('Empty picture data');
          const now = new Date().toLocaleTimeString([], { hour:'numeric', minute:'2-digit' });
          const msg = { who:'operator', text:'', imageData:dataUrl, imageName:originalFile.name || file.name || 'picture', at:now };
          let savedServerSide = false;
          try {
            const res = await fetch('/.netlify/functions/post-operator-message', {
              method:'POST',
              headers:{ 'Content-Type':'application/json', ...pinHeader() },
              body:JSON.stringify({ id:caseKey, consult_id:caseKey, public_id:publicId, text:'', imageData:dataUrl, imageName:msg.imageName })
            });
            const data = await res.json().catch(() => ({}));
            if (!res.ok || !data.ok) throw new Error(data.error || 'Could not save operator picture');
            savedServerSide = true;
          } catch (serverErr) {
            statusLine.textContent = 'Picture kept locally; server save failed: ' + (serverErr.message || serverErr);
          }
          if (!savedServerSide) {
            const local = getLocalThread(caseKey);
            local.push(msg);
            try {
              saveLocalThread(caseKey, local);
            } catch (storeErr) {
              local.pop();
              // Full-size iPhone library photos can exceed localStorage even after compression.
              // Keep the selected photo visible for this open page session instead of failing the whole attach.
              const sessionUrl = URL.createObjectURL(originalFile);
              msg.imageData = sessionUrl;
              msg.text = 'Photo attached locally for this session';
            }
          }
          updateLastMessagePreview(caseKey, files.length > 1 ? `${files.length} pictures attached` : 'Picture attached');
          setLastUndoAction(caseKey, { type:'message', imageName:msg.imageName, at:now });
          if (thread) {
            thread.insertAdjacentHTML('beforeend', renderMessageBubble(msg));
            thread.scrollTop = thread.scrollHeight;
            const imgs = thread.querySelectorAll('[data-expand-image]');
            const lastImg = imgs[imgs.length - 1];
            if (lastImg) lastImg.onclick = (event) => { event.preventDefault(); event.stopPropagation(); openMessageImage(lastImg.dataset.expandImage || lastImg.src); };
          }
          added += 1;
        } catch (err) {
          console.warn('Operator picture attach failed', err);
          statusLine.textContent = err.message || 'Could not read one or more pictures';
        }
      }
      if (added) statusLine.textContent = added > 1 ? `${added} pictures added to message thread` : 'Picture added to message thread';
    }


    async function handleStatusButton(btn) {
      if (!btn || btn.dataset.statusBusy === '1') return;
      const id = btn.dataset.id;
      const status = btn.dataset.actionStatus;
      const caseNo = btn.dataset.caseNo ? ('#' + btn.dataset.caseNo) : 'this case';
      if (!id || !status) return;

      const messages = {
        closed: `Close ${caseNo}? This will move it to the Closed list.`,
        archived: `Archive ${caseNo}? This will remove it from Closed and move it to Archived.`,
        waiting_on_customer: `Mark ${caseNo} as waiting on customer? This starts the 48-hour autoclose countdown.`,
        waiting_on_me: `Switch ${caseNo} back to waiting on me? This clears any active autoclose countdown.`
      };
      const prompt = messages[status] || `Change ${caseNo} to ${effectiveStatusLabel(status)}?`;
      if (!window.confirm(prompt)) return;

      btn.dataset.statusBusy = '1';
      btn.disabled = true;
      try {
        const card = btn.closest('.case');
        const shell = card && card.querySelector('.texting-shell');
        const thread = card && card.querySelector('.thread');
        const caseKey = shell ? shell.dataset.caseKey : id;

        if (status === 'waiting_on_customer') {
          startWaitingWorkflowLocalOnly({ id, caseKey, caseNo:btn.dataset.caseNo, thread });
        } else if (status === 'waiting_on_me') {
          clearWaitingWorkflow(caseKey);
        } else if (status === 'closed' || status === 'archived') {
          clearWaitingWorkflow(caseKey);
        }

        await updateStatus(id, status);
      } finally {
        btn.dataset.statusBusy = '0';
        btn.disabled = false;
      }
    }

    function refreshTimerSummaryInCard(caseKey) {
      const card = document.querySelector(`[data-case-key="${cssEscape(caseKey)}"]`);
      if (!card) return;
      const summaryBox = card.querySelector('.details .box');
      if (!summaryBox) return;
      const old = summaryBox.querySelector('.timer-summary');
      if (old) old.remove();
      const html = renderWaitingTimerSummary(caseKey);
      if (html) summaryBox.insertAdjacentHTML('beforeend', html.replace(/^\n\n/, ''));
    }

    function clearWaitingWorkflow(caseKey) {
      const key = 'wid_waiting_workflow_' + String(caseKey || '');
      clearWaitingTimerHandles(caseKey);
      localStorage.removeItem(key);
      refreshTimerSummaryInCard(caseKey);
      updateAutocloseUi(caseKey);
    }


    function startWaitingWorkflowLocalOnly({ id, caseKey, caseNo, thread, reset = false, silent = false }) {
      if (!caseKey) return;
      const key = 'wid_waiting_workflow_' + String(caseKey);
      const prevWorkflowRaw = localStorage.getItem(key);
      clearWaitingWorkflow(caseKey);
      const started = Date.now();
      const halfMs = 24 * 60 * 60 * 1000;
      const closeMs = 48 * 60 * 60 * 1000;
      const halfAt = started + halfMs;
      const closeAt = started + closeMs;
      const label = caseNo ? '#' + caseNo : 'this case';
      localStorage.setItem(key, JSON.stringify({ id, caseKey, caseNo, started, halfAt, closeAt, source:'waiting_on_customer_button' }));
      if (reset) {
        const undo = { type:'reset_timer', prevWorkflowRaw };
        setLastTimerUndo(caseKey, undo);
        if (!silent) setLastUndoAction(caseKey, undo);
      }
      refreshTimerSummaryInCard(caseKey);
      updateAutocloseUi(caseKey);
      if (!silent) statusLine.textContent = `${reset ? 'Autoclose reset' : 'Autoclose started'} · ${label}`;
      scheduleWaitingTimeouts(id, caseKey, caseNo, thread, started, halfAt, closeAt);
    }

    async function scheduleWaitingWorkflow({ id, caseKey, caseNo, thread, reset = false, silent = false }) {
      // Kept only for older calls. The visible button now clears timers;
      // changing status to Waiting on customer starts a fresh timer.
      startWaitingWorkflowLocalOnly({ id, caseKey, caseNo, thread, reset, silent });
    }

    function scheduleWaitingTimeouts(id, caseKey, caseNo, thread, started, halfAt, closeAt) {
      if (!caseKey || !started) return;
      clearWaitingTimerHandles(caseKey);
      const key = 'wid_waiting_workflow_' + String(caseKey);
      const label = caseNo ? '#' + caseNo : 'this case';
      const msUntilHalf = Math.max(0, Number(halfAt || 0) - Date.now());
      const msUntilClose = Math.max(0, Number(closeAt || 0) - Date.now());
      const halfTimer = window.setTimeout(() => {
        const saved = localStorage.getItem(key);
        if (!saved) return;
        try { if (JSON.parse(saved).started !== started) return; } catch (_) { return; }
        appendSystemMessage(caseKey, thread, `24-hour reminder for ${label}: no recorded customer response yet. 48-hour close point is ${new Date(Number(closeAt)).toLocaleString([], { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' })}.`);
        notifyOperator(`Follow-up reminder: ${label}`, '24 hours have passed without a recorded response.');
      }, msUntilHalf);
      const closeTimer = window.setTimeout(() => {
        const saved = localStorage.getItem(key);
        if (!saved) return;
        try { if (JSON.parse(saved).started !== started) return; } catch (_) { return; }
        appendSystemMessage(caseKey, thread, `48-hour close point reached for ${label}: no recorded customer response. Closing now while this page is open.`);
        notifyOperator(`Auto-close point: ${label}`, '48 hours passed. The page will try to close the case now.');
        if (id) updateStatus(id, 'closed');
      }, msUntilClose);
      rememberWaitingTimerHandle(caseKey, halfTimer);
      rememberWaitingTimerHandle(caseKey, closeTimer);
    }


    function closedArchiveDate(c) {
      const raw = c.closed_at || c.updated_at || c.created_at || '';
      const t = raw ? new Date(raw).getTime() : 0;
      return Number.isFinite(t) ? t : 0;
    }

    function closedOverOneWeek(c) {
      if (!isClosed(c)) return false;
      const t = closedArchiveDate(c);
      if (!t) return false;
      return Date.now() - t >= 7 * 24 * 60 * 60 * 1000;
    }

    async function updateStatusQuiet(id, status) {
      const res = await fetch('/.netlify/functions/update-consult-status', {
        method: 'POST',
        headers: { 'Content-Type':'application/json', ...pinHeader() },
        body: JSON.stringify({ id, status })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data.ok) throw new Error(data.error || 'Archive failed');
      return data;
    }

    async function archiveOldClosedCases(options = {}) {
      const manual = options.manual !== false;
      const items = Array.isArray(window.__widAllConsults) ? window.__widAllConsults : [];
      const due = items.filter(c => c && c.id && closedOverOneWeek(c));
      if (!due.length) {
        if (manual) statusLine.textContent = 'No closed cases older than 1 week to archive';
        return false;
      }
      if (manual && !window.confirm(`Archive ${due.length} closed case(s) older than 1 week?`)) return false;
      window.__widAutoArchiveRunning = true;
      statusLine.textContent = `Archiving ${due.length} old closed case(s)...`;
      try {
        for (const c of due) {
          clearWaitingWorkflow(getCaseKey(c, 0));
          await updateStatusQuiet(c.id, 'archived');
        }
        statusLine.textContent = `Archived ${due.length} old closed case(s)`;
        if (!options.skipReload) await loadConsults();
        return true;
      } catch (err) {
        list.innerHTML = `<div class="error">${escapeHtml(err.message || String(err))}</div>`;
        statusLine.textContent = 'Archive failed';
        return false;
      } finally {
        window.__widAutoArchiveRunning = false;
      }
    }

    async function updateStatus(id, status) {
      statusLine.textContent = 'Updating...';
      const buttons = Array.from(document.querySelectorAll('[data-action-status]'));
      buttons.forEach(btn => btn.disabled = true);
      const wasFocused = document.body.classList.contains('focus-mode');
      if (wasFocused) exitFocusMode({ restoreScroll:false });
      try {
        const res = await fetch('/.netlify/functions/update-consult-status', {
          method: 'POST', headers: { 'Content-Type':'application/json', ...pinHeader() }, body: JSON.stringify({ id, status })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) throw new Error(data.error || 'Update failed');
        await loadConsults();
        window.scrollTo({ top:0, behavior:'smooth' });
      } catch (err) {
        list.innerHTML = `<div class="error">${escapeHtml(err.message || String(err))}</div>`;
        statusLine.textContent = 'Update failed';
      } finally {
        buttons.forEach(btn => btn.disabled = false);
      }
    }

    function pinHeader() { const pin = pinInput.value || ''; return pin ? { 'x-operator-pin': pin } : {}; }
    function escapeHtml(v) { return String(v ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }
    function escapeAttr(v) { return escapeHtml(v); }


    function scrubBrokenWaitingWorkflows() {
      const now = Date.now();
      const prefix = 'wid_waiting_workflow_';
      for (let i = localStorage.length - 1; i >= 0; i--) {
        const key = localStorage.key(i);
        if (!key || !key.startsWith(prefix)) continue;
        try {
          const wf = JSON.parse(localStorage.getItem(key) || 'null');
          const closeAt = Number(wf && wf.closeAt);
          const started = Number(wf && wf.started);
          if (!wf || !closeAt || !started || closeAt < now - 6 * 60 * 60 * 1000) {
            localStorage.removeItem(key);
          }
        } catch (_) {
          localStorage.removeItem(key);
        }
      }
    }

    installViewportSizing();
    scrubBrokenWaitingWorkflows();
    syncAutoArchiveButton();
    loadConsults();
  </script>
</body>
